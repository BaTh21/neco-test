  cupertino_icons: ^1.0.8
  image_picker: ^1.0.4
  video_player: ^2.8.3
  file_picker: ^10.3.8
  http: ^1.2.1
  dio: ^5.4.0
  chewie: ^1.5.0
  photo_view: ^0.15.0
  web_socket_channel: ^3.0.3
  just_audio: ^0.10.5
  record: ^6.2.0
  permission_handler: ^12.0.1
  record_platform_interface: ^1.5.0
  path_provider: ^2.0.15
  provider: ^6.1.1
  equatable: ^2.0.5
  riverpod: ^3.2.1
  shared_preferences: ^2.2.2
  formz: ^0.8.0
  flutter_svg: ^2.0.10
  font_awesome_flutter: ^11.0.0
  cached_network_image: ^3.3.0
  intl: ^0.20.2
