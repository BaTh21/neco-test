version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ${PROJECT_NAME}-api
    ports:
      - "${BACKEND_PORT}:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    # depends_on:
    #   - db
    networks:
      - backend

  frontend:
    build: ./frontend/react
    container_name: ${PROJECT_NAME}-frontend
    ports:
      - "${FRONTEND_PORT}:5173"
    env_file:
      - ./frontend/react/.env
    volumes:
      - ./frontend/react:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - backend

  # db:
